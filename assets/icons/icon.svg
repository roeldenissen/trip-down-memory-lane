<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FDF8EE"/>
      <stop offset="50%" style="stop-color:#F5ECDA"/>
      <stop offset="100%" style="stop-color:#E8D5A3"/>
    </linearGradient>
    <linearGradient id="gold" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#C9A84C"/>
      <stop offset="100%" style="stop-color:#A07D2E"/>
    </linearGradient>
    <linearGradient id="green" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#5A8F5A"/>
      <stop offset="100%" style="stop-color:#4A7F4A"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="512" height="512" rx="96" fill="url(#bg)"/>
  <!-- Road/path -->
  <path d="M 120 420 C 120 320, 280 350, 256 256 C 232 162, 392 192, 392 92" fill="none" stroke="#c4b48a" stroke-width="28" stroke-linecap="round"/>
  <path d="M 120 420 C 120 320, 280 350, 256 256 C 232 162, 392 192, 392 92" fill="none" stroke="rgba(255,255,255,0.5)" stroke-width="3" stroke-dasharray="8 12" stroke-linecap="round"/>
  <!-- Heart at the top -->
  <g transform="translate(392, 72) scale(0.6)">
    <path d="M 0 20 C -10 -10, -40 -10, -40 15 C -40 40, 0 55, 0 55 C 0 55, 40 40, 40 15 C 40 -10, 10 -10, 0 20 Z" fill="url(#gold)" opacity="0.9"/>
  </g>
  <!-- Bicycle -->
  <g transform="translate(200, 230) scale(1.1)">
    <!-- Back wheel -->
    <circle cx="-30" cy="30" r="22" fill="none" stroke="url(#gold)" stroke-width="5"/>
    <!-- Front wheel -->
    <circle cx="40" cy="30" r="22" fill="none" stroke="url(#gold)" stroke-width="5"/>
    <!-- Frame -->
    <path d="M -30 30 L -10 0 L 30 0 L 40 30 M -10 0 L 10 30 L 30 0" fill="none" stroke="#5C4033" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>
    <!-- Handlebars -->
    <path d="M 28 -4 C 34 -8, 38 -6, 36 0" fill="none" stroke="#5C4033" stroke-width="3" stroke-linecap="round"/>
    <!-- Seat -->
    <path d="M -14 -2 L -6 -2" stroke="#5C4033" stroke-width="4" stroke-linecap="round"/>
  </g>
  <!-- Trees -->
  <g transform="translate(80, 180)" opacity="0.6">
    <text font-size="40">&#127794;</text>
  </g>
  <g transform="translate(380, 340)" opacity="0.5">
    <text font-size="36">&#127795;</text>
  </g>
  <g transform="translate(340, 150)" opacity="0.4">
    <text font-size="28">&#127800;</text>
  </g>
  <!-- "40" text -->
  <text x="256" y="460" text-anchor="middle" font-family="Georgia, serif" font-size="52" font-weight="700" fill="#A07D2E" opacity="0.8">40</text>
</svg>
